<!DOCTYPE html>
<html lang="es-ES">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="css/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-dark text-light">
    <header></header>
    <main class="container pt-0 pb-5">
        <div class="mx-auto" style="max-width: 100%;">
            <h1 class="text-center mb-4">Check List Juegos</h1>
            <p class="lead mb-5">
                ¡Bienvenido! Aquí podrás llevar en siguimiento una lista de tus juegos preferidos y así nunca
                olvidar jugarlos!.
            </p>
            <!--formulario-->
            <form id="miFormu" class="d-flex gap-2 mb-3">
                <input id="entradaJuego" type="text" placeholder="escribe el juego" name="busqueda">
                <button type="button" class="btn btn-primary" id="btnAgregarManual">agregar</button>
            </form>

            <p id="mensajeForm" class="text-danger m-0 mb-2" style="display: none;"></p>

            <!--los resultados-->
            <div id="resultadosBusqueda" class="row g-3"></div>
            <h3 class="mt-3">Lista de Juegos</h3>
            <div id="listGames" class="row g-3">
            </div>
        </div>
    </main>
    <button id="btnBuscar" class="btn-buscar">
        🔍
    </button>
    <footer></footer>

    <!--modelo para agregar juegos manualmente-->
    <div class="modal fade" id="modalAgregarJuego" tabindex="-1" aria-labelledby="modalAgregarJuegoLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-light">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalAgregarJuegoLabel">Agregar Juego Manualmente</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <form id="formAgregarManual">
                        <div class="mb-3">
                            <label for="nombreManual" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombreManual" required>
                        </div>
                        <div class="mb-3">
                            <label for="anioManual" class="form-label">Año</label>
                            <input type="number" class="form-control" id="anioManual" required>
                        </div>
                        <div class="mb-3">
                            <label for="imagenManual" class="form-label">Imagen(URL)</label>
                            <input type="text" class="form-control" id="imagenManual" required>
                        </div>
                    </form>
                    <!---msj de error-->
                    <p id="mensajeModal" class="text-danger m-0" style="display: none;"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="guardarManual">Guardar</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
